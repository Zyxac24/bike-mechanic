<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080e08;--bg2:#0f1c0f;--bg3:#1a2e1a;
  --border:#1e3a1e;--border2:#2a4a2a;
  --text:#d4e6d4;--text2:#c8e0c8;--text3:#a8c8a8;--text4:#6b8a6b;--text5:#5a7a5a;
  --green:#3d7a3d;--green2:#2d5a2d;--green3:#4a9e5c;
}
body{
  font-family:'Segoe UI','Helvetica Neue',system-ui,sans-serif;
  background:linear-gradient(160deg,var(--bg) 0%,#0c180c 40%,#101a12 100%);
  color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;
}

/* ═══ LOGIN ═══ */
.login-screen{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.login-box{
  width:100%;max-width:340px;background:rgba(15,28,15,.9);
  border:1px solid var(--border2);border-radius:20px;padding:32px 24px;
  box-shadow:0 8px 40px rgba(0,0,0,.4);
}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo .icon{
  width:64px;height:64px;background:linear-gradient(135deg,var(--green2),var(--green));
  border-radius:18px;display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;box-shadow:0 4px 20px rgba(45,90,45,.4);margin-bottom:12px;
}
.login-logo h1{font-size:20px;color:#c8ecc8;margin-bottom:4px}
.login-logo p{font-size:12px;color:var(--text4)}
.login-label{font-size:12px;color:var(--text4);margin-bottom:6px;font-weight:600}
.login-input{
  width:100%;background:rgba(20,40,20,.6);border:1px solid var(--border2);
  border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px;
  outline:none;font-family:inherit;margin-bottom:16px;text-align:center;
  letter-spacing:1px;
}
.login-input:focus{border-color:var(--green)}
.login-input::placeholder{color:#4a6a4a;letter-spacing:0}
.login-btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--green2),var(--green));
  color:#d4f0d4;font-size:15px;font-weight:700;cursor:pointer;
  transition:all .2s;box-shadow:0 2px 12px rgba(45,90,45,.3);
}
.login-btn:hover{filter:brightness(1.15)}
.login-btn:disabled{opacity:.5;cursor:default;filter:none}
.login-error{
  margin-top:12px;text-align:center;font-size:13px;color:#c45454;
  background:rgba(196,84,84,.1);border:1px solid rgba(196,84,84,.2);
  border-radius:8px;padding:8px;display:none;
}
.login-error.show{display:block}

/* ═══ HEADER ═══ */
.header{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--border2);padding:16px;
  position:sticky;top:0;z-index:10;
}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.logo{
  width:40px;height:40px;background:linear-gradient(135deg,var(--green2),var(--green));
  border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:20px;box-shadow:0 2px 12px rgba(45,90,45,.35);flex-shrink:0;
}
.header h1{font-size:17px;font-weight:700;color:#c8ecc8}
.header .sub{font-size:11px;color:#5a8a5a;margin-top:1px}
.user-info{
  margin-left:auto;display:flex;align-items:center;gap:8px;
}
.user-phone{font-size:11px;color:var(--text4)}
.logout-btn{
  background:rgba(90,45,45,.25);border:1px solid rgba(140,70,70,.3);
  color:#c47a7a;padding:4px 10px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:600;transition:all .2s;
}
.logout-btn:hover{background:rgba(90,45,45,.4)}
.search{
  width:100%;background:rgba(20,40,20,.6);border:1px solid var(--border2);
  border-radius:12px;padding:10px 14px;color:var(--text);font-size:14px;
  outline:none;font-family:inherit;margin-bottom:12px;
}
.search:focus{border-color:var(--green)}
.search::placeholder{color:#4a6a4a}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text4);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tab.active{border-color:var(--green);background:rgba(45,90,45,.3);color:#b8e6b8}

/* ═══ CONTENT ═══ */
.content{padding:16px 12px 80px}
.cat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-left:4px}
.cat-header .icon{font-size:18px}
.cat-header .name{font-weight:700;font-size:15px}
.cat-header .count{
  font-size:11px;color:var(--text5);background:rgba(30,50,30,.4);
  padding:1px 8px;border-radius:10px;
}
.cards{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.card{
  background:rgba(18,28,18,.85);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;transition:all .3s;
}
.card.expanded{box-shadow:0 4px 20px rgba(0,0,0,.2)}
.card-head{
  padding:14px 16px;cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;gap:10px;
}
.card-title{font-weight:700;font-size:14.5px;color:var(--text);margin-bottom:6px}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;
}
.meta-tag{font-size:11px;color:var(--text4)}
.arrow{font-size:18px;transition:transform .3s}
.card.expanded .arrow{transform:rotate(180deg)}
.card-body{padding:0 16px 16px;animation:fadeIn .3s ease}
.tools-box{
  background:rgba(30,50,30,.5);border-radius:10px;padding:10px 14px;margin-bottom:12px;
}
.section-label{
  font-size:11px;font-weight:700;color:#8aba8a;margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.5px;
}
.tools-list{font-size:13px;color:var(--text3);line-height:1.6}
.steps{margin-bottom:12px}
.step{display:flex;gap:10px;margin-bottom:8px;font-size:13.5px;line-height:1.5;color:var(--text2)}
.step-num{
  flex-shrink:0;width:22px;height:22px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;margin-top:1px;
}
.tip-box{
  background:rgba(60,50,20,.3);border:1px solid rgba(196,163,90,.2);
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
}
.tip-box .section-label{color:#c4a35a}
.tip-box p{font-size:13px;color:#c8c0a0;line-height:1.55}
.test-box{
  background:rgba(30,60,30,.3);border:1px solid rgba(74,158,92,.2);
  border-radius:10px;padding:10px 14px;margin-bottom:12px;
}
.test-box .section-label{color:var(--green3)}
.test-box p{font-size:13px;color:#a8d4a8;line-height:1.55}
.ai-btn{
  width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;border:1px solid;
}
.ai-btn:hover{filter:brightness(1.2)}

/* ═══ MODAL ═══ */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;
  align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .2s;
}
.modal{
  width:100%;max-width:600px;max-height:80vh;
  background:linear-gradient(135deg,var(--bg2),#162516);
  border-top:2px solid var(--green);border-radius:20px 20px 0 0;
  padding:20px 16px;overflow-y:auto;animation:slideUp .3s ease;
}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:700;color:#b8e6b8}
.modal-close{
  background:rgba(90,45,45,.3);border:1px solid rgba(180,90,90,.3);
  color:#c47a7a;width:30px;height:30px;border-radius:8px;cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;
}
.modal-body{font-size:14px;line-height:1.6;color:var(--text2);white-space:pre-wrap}
.dots{display:flex;justify-content:center;gap:6px;padding:30px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.dot:nth-child(1){animation:bounce 1.2s ease-in-out 0s infinite}
.dot:nth-child(2){animation:bounce 1.2s ease-in-out .15s infinite}
.dot:nth-child(3){animation:bounce 1.2s ease-in-out .3s infinite}
.empty{text-align:center;padding:40px;color:var(--text5)}
.offline-badge{
  display:none;background:#c4a35a22;border:1px solid #c4a35a44;color:#c4a35a;
  padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;margin-left:6px;
}
body.offline .offline-badge{display:inline-block}
body.offline .ai-btn{opacity:.4;pointer-events:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
</style>
</head>

// ═══════════════════════════════════════════════════════════════
// KONFIGURACJA — ZMIEŃ NA SWÓJ ADRES WORKERA
// ═══════════════════════════════════════════════════════════════
const WORKER_URL = "https://bike-mechanic.TWOJA-SUBDOMENA.workers.dev";

// ═══════════════════════════════════════════════════════════════
// SESJA
// ═══════════════════════════════════════════════════════════════
let authToken = localStorage.getItem("bm_token") || "";
let authPhone = localStorage.getItem("bm_phone") || "";

function checkSession() {
  if (authToken && authPhone) {
    showApp();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById("loginScreen").style.display = "";
  document.getElementById("appScreen").style.display = "none";
}

function showApp() {
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "";
  document.getElementById("userPhone").textContent = authPhone;
  render();
}

async function doLogin() {
  const btn = document.getElementById("loginBtn");
  const errEl = document.getElementById("loginError");
  const raw = document.getElementById("phoneInput").value.trim();

  // Normalizuj numer — usuń spacje, myślniki
  const phone = raw.replace(/[\s\-\(\)]/g, "");
  if (!phone) return;

  btn.disabled = true;
  btn.textContent = "Sprawdzam...";
  errEl.classList.remove("show");

  try {
    const res = await fetch(WORKER_URL + "/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone }),
    });
    const data = await res.json();

    if (data.ok && data.token) {
      authToken = data.token;
      authPhone = phone;
      localStorage.setItem("bm_token", authToken);
      localStorage.setItem("bm_phone", authPhone);
      showApp();
    } else {
      errEl.textContent = data.error || "Brak dostępu. Sprawdź numer telefonu.";
      errEl.classList.add("show");
    }
  } catch (e) {
    errEl.textContent = "Błąd połączenia z serwerem. Sprawdź internet.";
    errEl.classList.add("show");
  } finally {
    btn.disabled = false;
    btn.textContent = "Zaloguj się";
  }
}

function doLogout() {
  authToken = "";
  authPhone = "";
  localStorage.removeItem("bm_token");
  localStorage.removeItem("bm_phone");
  showLogin();
}

// Enter na polu telefonu
document.getElementById("phoneInput").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

// ═══════════════════════════════════════════════════════════════
// STAN
// ═══════════════════════════════════════════════════════════════
let activeCategory=null, searchQuery="", expandedCards=new Set();
const diffLabels=["Info","Łatwe","Średnie","Trudne","Zaawansowane"];
const diffColors=["#6b9a6b","#4a9e5c","#c4a35a","#c47a5a","#c45454"];

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  document.getElementById("totalCards").textContent=DB.reduce((s,c)=>s+c.cards.length,0);
  renderTabs();renderContent();
}

function renderTabs(){
  const t=document.getElementById("tabs");
  let h=`<button class="tab${!activeCategory?' active':''}" onclick="setCategory(null)">Wszystko</button>`;
  DB.forEach(c=>{
    const a=activeCategory===c.id;
    h+=`<button class="tab${a?' active':''}" style="${a?`border-color:${c.color}77;background:${c.color}22;color:${c.color}`:''}" onclick="setCategory('${c.id}')">${c.icon} ${c.name}</button>`;
  });
  t.innerHTML=h;
}

function renderContent(){
  const cont=document.getElementById("content");
  const f=getFiltered();
  if(!f.length){cont.innerHTML=`<div class="empty">Brak wyników dla "${searchQuery}"</div>`;return;}
  let h="";
  f.forEach(cat=>{
    h+=`<div class="cat-header"><span class="icon">${cat.icon}</span><span class="name" style="color:${cat.color}">${cat.name}</span><span class="count">${cat.cards.length}</span></div><div class="cards">`;
    cat.cards.forEach((card,i)=>{
      const k=cat.id+"-"+i, exp=expandedCards.has(k), lvl=Math.max(card.difficulty,1);
      h+=`<div class="card${exp?' expanded':''}" ${exp?`style="border-color:${cat.color}66"`:''}>`;
      h+=`<div class="card-head" onclick="toggleCard('${k}')"><div style="flex:1"><div class="card-title">${card.title}</div><div class="card-meta"><span class="badge" style="background:${diffColors[card.difficulty]}22;border:1px solid ${diffColors[card.difficulty]}55;color:${diffColors[card.difficulty]}">${"●".repeat(lvl)}${"○".repeat(4-lvl)} ${diffLabels[card.difficulty]}</span>${card.time!=="—"?`<span class="meta-tag">⏱ ${card.time}</span>`:''}${card.frequency&&card.frequency!=="—"?`<span class="meta-tag">🔄 ${card.frequency}</span>`:''}</div></div><span class="arrow" style="color:${cat.color}">▾</span></div>`;
      if(exp){
        h+=`<div class="card-body">`;
        if(card.tools&&card.tools.length)h+=`<div class="tools-box"><div class="section-label">🔧 Potrzebne narzędzia</div><div class="tools-list">${card.tools.join(" • ")}</div></div>`;
        h+=`<div class="steps"><div class="section-label" style="margin-bottom:8px">Kroki</div>`;
        card.steps.forEach((s,si)=>{const ic=s.startsWith("🔧")||s.startsWith("🔄")||s.startsWith("💰");h+=`<div class="step"><span class="step-num" style="background:${cat.color}25;color:${cat.color}">${ic?'':si+1}</span><span>${s}</span></div>`;});
        h+=`</div>`;
        if(card.tips)h+=`<div class="tip-box"><div class="section-label">💡 Wskazówki</div><p>${card.tips}</p></div>`;
        if(card.test&&card.test!=="—")h+=`<div class="test-box"><div class="section-label">✅ Test po naprawie</div><p>${card.test}</p></div>`;
        h+=`<button class="ai-btn" style="background:${cat.color}20;border-color:${cat.color}40;color:${cat.color}" onclick="askAI('${card.title.replace(/'/g,"\\'")}')">🤖 Zapytaj AI o więcej szczegółów</button></div>`;
      }
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  cont.innerHTML=h;
}

function getFiltered(){
  if(!searchQuery.trim()){return activeCategory?DB.filter(c=>c.id===activeCategory):DB;}
  const q=searchQuery.toLowerCase();
  return DB.map(c=>({...c,cards:c.cards.filter(d=>d.title.toLowerCase().includes(q)||d.steps.some(s=>s.toLowerCase().includes(q))||(d.tips&&d.tips.toLowerCase().includes(q))||(d.tools&&d.tools.some(t=>t.toLowerCase().includes(q))))})).filter(c=>c.cards.length);
}

function setCategory(id){activeCategory=id;searchQuery="";document.getElementById("searchInput").value="";expandedCards.clear();render();}
function toggleCard(k){expandedCards.has(k)?expandedCards.delete(k):expandedCards.add(k);renderContent();}

// ═══════════════════════════════════════════════════════════════
// AI — przez Cloudflare Worker
// ═══════════════════════════════════════════════════════════════
async function askAI(title){
  const modal=document.getElementById("modal");
  const body=document.getElementById("modalBody");
  document.getElementById("modalTitle").textContent="🤖 "+title;
  body.innerHTML=`<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div style="text-align:center;color:#5a8a5a">Przygotowuję odpowiedź...</div>`;
  modal.style.display="flex";

  try{
    const r=await fetch(WORKER_URL+"/ai",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+authToken},
      body:JSON.stringify({
        phone: authPhone,
        model:"anthropic/claude-sonnet-4-20250514",
        messages:[
          {role:"system",content:"Jesteś ekspertem mechanikiem rowerowym. Odpowiadaj po polsku, konkretnie. Podawaj częste błędy i triki profesjonalistów."},
          {role:"user",content:`Dodatkowe szczegóły, częste błędy i triki: "${title}" — rower gravelowy, hamulce tarczowe hydrauliczne. Praktyka, nie teoria.`}
        ]
      })
    });
    const d=await r.json();

    if(d.error){
      body.innerHTML=`<div class="modal-body">⚠️ ${d.error}</div>`;
      return;
    }

    const txt=d.choices?.[0]?.message?.content || "Brak odpowiedzi.";
    body.innerHTML=`<div class="modal-body">${txt}</div>`;
  }catch(e){
    body.innerHTML=`<div class="modal-body">⚠️ Błąd połączenia. Baza wiedzy działa offline, AI wymaga internetu.</div>`;
  }
}
function closeModal(){document.getElementById("modal").style.display="none";}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.getElementById("searchInput").addEventListener("input",e=>{searchQuery=e.target.value;if(searchQuery)activeCategory=null;expandedCards.clear();render();});
window.addEventListener("online",()=>document.body.classList.remove("offline"));
window.addEventListener("offline",()=>document.body.classList.add("offline"));
if(!navigator.onLine)document.body.classList.add("offline");
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});

// Start
checkSession();
</script>
